services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ghost-net

  proxy:
    build: .
    command: node src/proxy.js
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - ghost-net

  worker:
    build: .
    command: node src/worker.js
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - ghost-net

volumes:
  redis-data:

networks:
  ghost-net:
    external: true
    name: ${GHOST_NETWORK}
